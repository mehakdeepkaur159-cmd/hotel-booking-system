version: "3.9"

services:
  db:
    image: postgres:16
    container_name: hotel_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mehak2005
      POSTGRES_DB: hotel_booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: hotel_api
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  postgres_data:
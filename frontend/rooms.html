<!DOCTYPE html>
<html>
<head>
    <title>Rooms</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body onload="loadRoomsFromURL()">

<nav>
    <h2>Hotel Booking</h2>

    <div>
        <a href="index.html">Home</a>
        <a href="rooms.html">Rooms</a>
        <a href="my-bookings.html">My Bookings</a>
        <a href="login.html">Login</a>

        <button onclick="logoutUser()">
            Logout
        </button>
    </div>
</nav>

<h1 class="page-title">Available Rooms</h1>

<div class="search-box">

    <input
        type="text"
        id="roomType"
        placeholder="Room Type"
    >

    <input
        type="number"
        id="maxPrice"
        placeholder="Max Price"
    >

    <button onclick="searchRooms()">
        Search
    </button>

    <button onclick="resetRooms()">
        Reset
    </button>

</div>

<div id="rooms-container" class="rooms-container"></div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeBookingModal()">&times;</span>

        <h2>Book Room</h2>

        <input type="hidden" id="selectedRoomId">

        <label>Check-in Date</label>
        <input type="date" id="checkInDate">

        <label>Check-out Date</label>
        <input type="date" id="checkOutDate">

        <button onclick="submitBooking()">Confirm Booking</button>
    </div>
</div>
<div id="successPopup" class="success-popup">
    Booking Successful 🎉
</div>

<script src="script.js"></script>
</body>
</html>
